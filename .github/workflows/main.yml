- name: Triển khai lên DevOps Classroom
        run: |
          REPO="minhtuyetvoi/binhminh-app"
          CONTAINER_PORT=80
          
          # Thực hiện gọi Webhook và lấy kết quả
          # Phân tách Body và Http Code bằng cách lấy dòng cuối cùng
          RESPONSE=$(curl -sS -w "\n%{http_code}" -X POST "${{ secrets.DEPLOY_URL }}?repo=$REPO&tag=latest&slot=1&container_port=$CONTAINER_PORT&strict_container_port=0")
          
          # Lấy HTTP Code (dòng cuối cùng)
          CODE=$(echo "$RESPONSE" | tail -n1 | tr -d '[:space:]')
          
          # Lấy Body (tất cả các dòng TRỪ dòng cuối cùng)
          BODY=$(echo "$RESPONSE" | sed '$d')
          
          echo "Webhook HTTP Status: $CODE"
          
          if [ "$CODE" -lt 200 ] || [ "$CODE" -ge 300 ]; then
            echo "::error::Deploy thất bại với mã lỗi $CODE"
            echo "::group::Chi tiết lỗi JSON"
            echo "$BODY" | python3 -m json.tool 2>/dev/null || echo "$BODY"
            echo "::endgroup::"
            exit 1
          fi
          
          echo "Deploy thành công rực rỡ!"
          echo "::group::Chi tiết phản hồi JSON"
          echo "$BODY" | python3 -m json.tool 2>/dev/null || echo "$BODY"
          echo "::endgroup::"
